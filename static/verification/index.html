<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flutter Operator Console Verification</title>
  <meta name="description" content="Verification notes for the Flutter Operator Console reference implementation.">
  <style>
    body{margin:0;padding:40px;font-family:ui-sans-serif,system-ui;background:#05070c;color:#e9f3ff}
    main{max-width:920px;margin:0 auto}
    h1{font-size:44px;line-height:1;margin:0 0 16px}
    p,li{font-size:16px;line-height:1.6;color:rgba(233,243,255,.82)}
    .pill{display:inline-block;padding:8px 12px;border:1px solid rgba(25,199,255,.3);border-radius:999px;color:#19c7ff;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
    a{color:#37ff8b}
    .card{margin-top:24px;padding:24px;border:1px solid rgba(25,199,255,.2);border-radius:18px;background:linear-gradient(180deg,rgba(11,18,32,.95),rgba(8,14,26,.92))}
  </style>
</head>
<body>
  <main>
    <span class="pill">verification</span>
    <h1>Release Gate</h1>
    <div class="card">
      <ul>
        <li>`flutter analyze`</li>
        <li>`flutter test`</li>
        <li>`flutter build web --release`</li>
        <li>GitHub Pages deploy with custom domain, robots, and sitemap</li>
      </ul>
      <p><a href="/">Return to the live console</a></p>
    </div>
  </main>
</body>
</html>
